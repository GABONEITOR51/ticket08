<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #333;
        line-height: 1.6;
    }

    .title-header {
        font-size: 30px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 10px;
        color: #003366;
        letter-spacing: 1px;
    }

    table.main-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
    }

    .data-cell {
        vertical-align: top;
        padding: 15px;
        border: 1px solid #ddd;
    }

    .section-title {
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 12px;
        color: #0056b3;
        border-bottom: 2px solid #0056b3;
        padding-bottom: 6px;
        letter-spacing: 0.8px;
    }

    .row {
        margin-bottom: 8px;
        display: flex;
        align-items: baseline;
    }

    .label {
        font-weight: bold;
        width: 120px;
        flex-shrink: 0;
        color: #555;
    }

    .value {
        flex-grow: 1;
        word-wrap: break-word;
    }

    table.dependents-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    table.dependents-table th {
        background-color: #f2f2f2;
        padding: 8px;
        border: 1px solid #ccc;
        font-weight: bold;
        text-align: left;
    }

    table.dependents-table td {
        padding: 8px;
        border: 1px solid #ccc;
    }

    .signature-section {
        margin-top: 60px;
        text-align: center;
        font-size: 16px;
    }

    .signature-line {
        margin-top: 40px;
        border-top: 1px solid #000;
        width: 60%;
        margin-left: auto;
        margin-right: auto;
        padding-top: 5px;
    }
</style>

</head>
<body>

<div class="title-header">Formulario para taxes</div>

<table class="main-table">
    <tr>
        <td class="data-cell">
            <div class="section-title">Principal</div>
            <div class="row"><span class="label">Nombre:</span> <span class="value" id="nombre"></span></div>
            <div class="row"><span class="label">Domicilio:</span> <span class="value" id="domicilio"></span></div>
            <div class="row"><span class="label">Fecha Nac.:</span> <span class="value" id="dob"></span></div>
            <div class="row"><span class="label">Teléfono:</span> <span class="value" id="telefono"></span></div>
            <div class="row"><span class="label">SSN:</span> <span class="value" id="ssn"></span></div>
            <div class="row"><span class="label">ITIN:</span> <span class="value" id="itin"></span></div>
            <div class="row"><span class="label">Ocupación:</span> <span class="value" id="ocupacion"></span></div>
            <div class="row"><span class="label">Estado Civil:</span> <span class="value" id="ecivil"></span></div>
            <div class="row"><span class="label">Correo:</span> <span class="value" id="correo"></span></div>
        </td>

        <td class="data-cell">
            <div class="section-title">Cónyuge</div>
            <div class="row"><span class="label">Nombre:</span> <span class="value" id="s_nombre"></span></div>
            <div class="row"><span class="label">Domicilio:</span> <span class="value" id="s_domicilio"></span></div>
            <div class="row"><span class="label">Fecha Nac.:</span> <span class="value" id="s_dob"></span></div>
            <div class="row"><span class="label">Teléfono:</span> <span class="value" id="s_telefono"></span></div>
            <div class="row"><span class="label">SSN:</span> <span class="value" id="s_ssn"></span></div>
            <div class="row"><span class="label">ITIN:</span> <span class="value" id="s_itin"></span></div>
            <div class="row"><span class="label">Ocupación:</span> <span class="value" id="s_ocupacion"></span></div>
            <div class="row"><span class="label">Correo:</span> <span class="value" id="s_correo"></span></div>
        </td>
    </tr>
</table>

<h2 style="margin-top:30px; font-family:'Segoe UI', Arial; color: #0056b3;">Dependientes</h2>

<table class="dependents-table">
    <tr>
        <th>#</th>
        <th>Nombre</th>
        <th>SSN</th>
        <th>Fecha Nac.</th>
        <th>Relación</th>
        <th>Estudia</th>
        <th>Discapacidad</th>
        <th>Acta</th>
    </tr>

    <tbody id="dependents-body"></tbody>
</table>

<div class="signature-section">
    <div class="signature-line"></div>
    firma<br>
    Nombre y fecha
</div>

<script>
function getParam(name) {
  const url = new URL(window.location.href);
  return decodeURIComponent(url.searchParams.get(name) || "");
}

// PRINCIPAL
document.getElementById("nombre").textContent = getParam("nombre");
document.getElementById("domicilio").textContent = getParam("domicilio");
document.getElementById("dob").textContent = getParam("dob");
document.getElementById("telefono").textContent = getParam("telefono");
document.getElementById("ssn").textContent = getParam("ssn");
document.getElementById("itin").textContent = getParam("itin");
document.getElementById("ocupacion").textContent = getParam("ocupacion");
document.getElementById("ecivil").textContent = getParam("ecivil");
document.getElementById("correo").textContent = getParam("correo");

// CÓNYUGE
document.getElementById("s_nombre").textContent = getParam("s_nombre");
document.getElementById("s_domicilio").textContent = getParam("s_domicilio");
document.getElementById("s_dob").textContent = getParam("s_dob");
document.getElementById("s_telefono").textContent = getParam("s_telefono");
document.getElementById("s_ssn").textContent = getParam("s_ssn");
document.getElementById("s_itin").textContent = getParam("s_itin");
document.getElementById("s_ocupacion").textContent = getParam("s_ocupacion");
document.getElementById("s_correo").textContent = getParam("s_correo");

// DEPENDIENTES (tabla plana sin foto)
const tbody = document.getElementById("dependents-body");

for (let i = 1; i <= 6; i++) {
    const row = `
        <tr>
            <td>${i}.-</td>
            <td>${getParam(i + "_Nombre")}</td>
            <td>${getParam(i + "_SSN")}</td>
            <td>${getParam(i + "_DOB")}</td>
            <td>${getParam(i + "_Relacion")}</td>
            <td>${getParam(i + "_Estudia") === "TRUE" ? "Sí" : ""}</td>
            <td>${getParam(i + "_Discapacidad") === "TRUE" ? "Sí" : ""}</td>
            <td>${getParam(i + "_Acta")}</td>
        </tr>
    `;
    tbody.innerHTML += row;
}
</script>

</body>
</html>
